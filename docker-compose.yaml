services:
  # nginx web server
  web: 
    image: nginx:alpine
    container_name: "nginx_server"
    ports:
      - "80:80"
      # host:container
    volumes: 
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./app/:/var/www/html
    depends_on:
      app:
        condition: service_started
    networks:
      - backend
  
  # php 8.4 FPM
  app:
    container_name: "php_app"
    build: 
      context: .
      dockerfile: ./php/Dockerfile
    volumes: 
      - ./app/:/var/www/html
    environment: 
      APP_ENV: ${APP_ENV}
      DB_MYSQL_HOST: mysql
      DB_MYSQL_PORT: ${DB_PORT}
      DB_MYSQL_DATABASE: ${DB_NAME}
      DB_MYSQL_USERNAME: ${DB_USER}
      DB_MYSQL_PASSWORD: ${DB_PASSWORD}
    depends_on:
      mysql: 
        condition: service_healthy
    networks:
      - backend

  # mysql
  mysql: 
    image: mysql:9.7.1
    container_name: "mysql"
    ports: 
      - "${DB_PORT}:3306"
      # host:container
    volumes:
      - mysqldata:/var/lib/mysql
    restart: unless-stopped
    environment: 
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD} 
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    healthcheck:                 
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
  
  # phpmyadmin 5.2
  phpmyadmin: 
    image: phpmyadmin:5.2.3-apache
    container_name: "phpmyadmin_panel"
    restart: unless-stopped
    ports: 
      - "${PMA_PORT}:80"
      # host:container
    environment: 
      PMA_HOST: mysql 
      PMA_PORT: 3306 
      PMA_USER: root 
      PMA_PASSWORD: ${DB_ROOT_PASSWORD} 
      UPLOAD_LIMIT: 100M
    depends_on:
      mysql: 
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysqldata: